workflows:
  android-workflow:
    name: Zombie Survival 3D - Android
    max_build_duration: 60
    environment:
      groups:
        - google_play
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
    scripts:
      - name: Set up Python 3.11
        script: |
          # Use pyenv to switch to Python 3.11
          export PYENV_ROOT="$HOME/.pyenv"
          export PATH="$PYENV_ROOT/bin:$PATH"
          eval "$(pyenv init --path)"
          pyenv install 3.11.8 || true
          pyenv global 3.11.8
          python --version
      - name: Install Python dependencies
        script: |
          pip3 install buildozer cython==3.0.8 Pillow setuptools
      - name: Build Android APK
        script: |
          buildozer android debug
    artifacts:
      - bin/*.apk
    publishing:
      email:
        recipients:
          - daveguibejar@gmail.com
        notify:
          success: true
          failure: true
