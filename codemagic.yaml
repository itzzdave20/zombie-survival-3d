workflows:
  android-workflow:
    name: Zombie Survival 3D - Android
    max_build_duration: 60
    environment:
      groups:
        - google_play
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
    scripts:
      - name: Install Python dependencies
        script: |
          pip3 install buildozer cython==3.0.8 Pillow
          pip3 install --upgrade git+https://github.com/kivy/python-for-android.git
          
          # Patch python-for-android to skip openssl check
          P4A_PATH=$(python3 -c "import pythonforandroid; print(pythonforandroid.__path__[0])")
          python3 << EOF
import re
p4a_path = "${P4A_PATH}"
with open(f"{p4a_path}/prerequisites.py", "r") as f:
    content = f.read()
# Disable openssl check
content = re.sub(r'class openssl\(prerequisite\):', 'class openssl(prerequisite):\n    darwin_formula = None  # Disabled', content)
content = re.sub(r'if self\.ask_to_install\(\):', 'if False and self.ask_to_install():', content)
with open(f"{p4a_path}/prerequisites.py", "w") as f:
    f.write(content)
print("Patched successfully!")
EOF
      - name: Build Android APK
        script: |
          buildozer android debug
    artifacts:
      - bin/*.apk
    publishing:
      email:
        recipients:
          - daveguibejar@gmail.com
        notify:
          success: true
          failure: true
