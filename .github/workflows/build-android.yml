name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: kivy/buildozer

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install Pillow

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zombie-survival-3d-apk
          path: bin/*.apk
